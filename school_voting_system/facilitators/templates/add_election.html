{% extends "master.html" %}
{% load static %}
{% block title %}
Add Election
{% endblock %}

{% block content %}
    <form method="POST">
        {% csrf_token %}
        {{add_election_form.as_p}}<br>

        <label for="position">Add Position</label><br>
        <input type="text" id="position"><br>
        <label for="seat_count">Seat Count</label><br>
        <input type="number" id="seat_count" min="1" value="1"><br>
        <button type="button" onclick="add_position()">Add Position</button><br>

        <label for="">Qualified Voters</label><br>
        <label for="year_level">Year Level</label>
        <select name="year_level" id="year_level">
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
        </select><br>
        <label for="course">Course</label>
        <select name="course" id="course">
            {% for course in courses%}
            <option value="{{course.id}}">{{course.title}}</option>
            {% endfor %}
        </select>
        <input type="hidden" name="positions" id="positions">
        <input type="hidden" name="year_levels" id="year_level">
        <input type="hidden" name="courses" id="course">
        <button onclick="create_election()" type="submit">Submit</button>
    </form>
    <script src="../static/facilitators/js/add_election.js"></script>
{% endblock %}
