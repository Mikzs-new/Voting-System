{% extends "master.html" %}

{% block title %}
    Student Login
{% endblock %}

{% block content %}
    <h1>Student Login</h1>
    {% if error %}
        <h3>Wrong Credentials</h3>
    {% elif expired %}
        <h3>Verification Expired. Login Again</h3>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        {{voter_login.as_p}}
        <button type="submit">LOGIN</button>
    </form>
{% endblock %}
